<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BitBalance</title>
    <!-- Paint the themed background + resolve the theme BEFORE the JS bundle and
         styles.css load, so a dark-theme user never sees a white flash on a cold
         load. Mirrors src/lib/theme.js (localStorage 'theme' -> resolved light/dark);
         theme.js re-applies the same value at import, so this is just the early paint. -->
    <style>
      html { background: #0f1115; color-scheme: dark; }
      html[data-theme="light"] { background: #f4f6fa; color-scheme: light; }
    </style>
    <script>
      (function () {
        try {
          var p = localStorage.getItem('theme');
          var dark =
            p === 'dark' ||
            ((!p || p === 'system') &&
              window.matchMedia &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.dataset.theme = dark ? 'dark' : 'light';
        } catch (e) {
          document.documentElement.dataset.theme = 'dark';
        }
      })();
    </script>
    <!-- Favicon / app icons. SVG for modern browsers (crisp at any size), PNG +
         .ico fallbacks for legacy, apple-touch-icon for iOS home screen, and a
         web manifest for Android/PWA install. The green "B" tile mirrors the
         in-app brand-mark (AppLayout .brand-mark) for tab/app consistency. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#0f1115" />
    <!-- Font Awesome 6 — same icon set the PHP app uses (fas/fa-solid classes). -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      integrity="sha512-Avb2QiuDEEvB4bZJYdft2mNjVShBftLdPG8FJ0V7irTLQ8Uo0qcPxh4Plq7G5tGm0rU+1SPhVotteLpBERwTkw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
